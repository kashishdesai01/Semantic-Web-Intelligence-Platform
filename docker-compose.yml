services:
  db:
    image: pgvector/pgvector:pg16
    container_name: swip-db
    environment:
      POSTGRES_USER: swip
      POSTGRES_PASSWORD: swip
      POSTGRES_DB: swip
    ports:
      - "5433:5432"
    volumes:
      - swip_pgdata:/var/lib/postgresql/data
  redis:
    image: redis:7-alpine
    container_name: swip-redis
    ports:
      - "6379:6379"

volumes:
  swip_pgdata:
